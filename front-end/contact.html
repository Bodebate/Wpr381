<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventurer — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Supermercado+One&family=Squada+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav id="main-nav">
    <a class="nav-logo" href="events.html">
      <svg viewBox="0 0 34 28" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linejoin="round" stroke-linecap="round">
        <path d="M2 26 L13 5 L19 14 L23 9 L32 26 Z" fill="currentColor" fill-opacity="0.18"/>
        <path d="M2 26 L13 5 L19 14 L23 9 L32 26"/>
        <path d="M23 9 L25 3"/><path d="M25 3 L27 6"/>
      </svg>
      Eventurer
    </a>
    <ul class="nav-links">
      <li><a href="bookings.html">Bookings</a></li>
      <li><a href="events.html">Events</a></li>
      <li class="nav-signout"><a href="index.html">Sign Out</a></li>
    </ul>
  </nav>

  <div class="page-content">
    <div class="contact-wrap card">
      <div class="contact-fields">
        <div class="form-group">
          <label>Name</label>
          <input class="input-std" type="text" id="contact-name" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="input-std" type="email" id="contact-email" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input class="input-std" type="text" id="contact-subject">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea class="input-std" id="contact-message"
                    rows="4" style="resize:vertical"></textarea>
        </div>
        <button class="btn btn-yellow" onclick="handleSendEnquiry(event)">
          Send Enquiry ›
        </button>
      </div>

      <div class="contact-info">
        <p>Please remember to be as detailed as possible to give us the best chance of being able to assist you.</p>
      </div>
    </div>
  </div>

  <script src="basic.js"></script>
</body>
</html>
