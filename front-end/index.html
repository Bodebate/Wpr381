<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventurer — Register / Log In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Supermercado+One&family=Squada+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="auth-page">
    <nav id="main-nav" class="nav-center">
      <a class="nav-logo" href="events.html">
        <svg
          viewBox="0 0 34 28"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linejoin="round"
          stroke-linecap="round"
        >
          <path
            d="M2 26 L13 5 L19 14 L23 9 L32 26 Z"
            fill="currentColor"
            fill-opacity="0.18"
          />
          <path d="M2 26 L13 5 L19 14 L23 9 L32 26" />
          <path d="M23 9 L25 3" />
          <path d="M25 3 L27 6" />
        </svg>
        Eventurer
      </a>
    </nav>

    <div class="auth-card card">
      <div class="form-group">
        <label>First Name:</label>
        <input
          class="input-std"
          type="text"
          id="reg-name"
          autocomplete="given-name"
        />
      </div>
      <div class="form-group">
        <label>Surname:</label>
        <input
          class="input-std"
          type="text"
          id="reg-surname"
          autocomplete="family-name"
        />
      </div>
      <div class="form-group">
        <label>Phone No.:</label>
        <input class="input-std" type="tel" id="reg-phone" autocomplete="tel" />
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input
          class="input-std"
          type="email"
          id="reg-email"
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <label>Password:</label>
        <input
          class="input-std"
          type="password"
          id="reg-password"
          autocomplete="new-password"
        />
      </div>
      <div class="auth-actions">
        <button class="btn btn-red" onclick="handleRegister(event)">
          Register
        </button>
        <button class="btn btn-yellow underline" onclick="handleLogin(event)">
          Log In
        </button>
      </div>
    </div>

    <script src="basic.js"></script>
  </body>
</html>
